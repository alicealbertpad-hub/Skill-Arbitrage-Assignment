<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Split Calculator</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f5f5f7;
    --card-bg: #ffffff;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #e0e0e5;
    --advance: #0a7d4f;
    --advance-bg: #e6f6ee;
    --balance: #1a5fb4;
    --balance-bg: #e8f0fc;
    --accent: #0a7d4f;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 32px;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
  }

  h1 {
    font-size: 1.25rem;
    margin: 0 0 24px;
    text-align: center;
  }

  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 28px;
  }

  .input-wrap .currency {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  input[type="number"] {
    width: 100%;
    font-size: 1.4rem;
    padding: 14px 14px 14px 32px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s ease;
  }

  input[type="number"]:focus {
    border-color: var(--accent);
  }

  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .results {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .result-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    border-radius: 12px;
  }

  .result-row.advance {
    background: var(--advance-bg);
  }

  .result-row.balance {
    background: var(--balance-bg);
  }

  .result-label {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .result-title {
    font-weight: 600;
    font-size: 0.95rem;
  }

  .result-sub {
    font-size: 0.78rem;
    color: var(--muted);
  }

  .result-amount {
    font-size: 1.3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .advance .result-amount,
  .advance .result-title {
    color: var(--advance);
  }

  .balance .result-amount,
  .balance .result-title {
    color: var(--balance);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0f11;
      --card-bg: #1c1c1e;
      --text: #f5f5f7;
      --muted: #9a9a9e;
      --border: #333335;
      --advance-bg: #113522;
      --balance-bg: #10233d;
    }
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Project Payment Split Calculator</h1>

    <div class="input-wrap">
      <label for="total-price">Total project price</label>
      <span class="currency">₹</span>
      <input type="number" id="total-price" placeholder="0.00" min="0" step="0.01" inputmode="decimal">
    </div>

    <div class="results">
      <div class="result-row advance">
        <div class="result-label">
          <span class="result-title">Advance (40%)</span>
          <span class="result-sub">Collect now</span>
        </div>
        <span class="result-amount" id="advance-amount">₹0.00</span>
      </div>
      <div class="result-row balance">
        <div class="result-label">
          <span class="result-title">Balance (60%)</span>
          <span class="result-sub">Collect on delivery</span>
        </div>
        <span class="result-amount" id="balance-amount">₹0.00</span>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('total-price');
    const advanceEl = document.getElementById('advance-amount');
    const balanceEl = document.getElementById('balance-amount');

    const currencyFormatter = new Intl.NumberFormat('en-IN', {
      style: 'currency',
      currency: 'INR',
      minimumFractionDigits: 2,
      maximumFractionDigits: 2,
    });

    function update() {
      const total = parseFloat(input.value);
      const safeTotal = Number.isFinite(total) && total > 0 ? total : 0;
      advanceEl.textContent = currencyFormatter.format(safeTotal * 0.4);
      balanceEl.textContent = currencyFormatter.format(safeTotal * 0.6);
    }

    input.addEventListener('input', update);
    update();
  </script>
</body>
</html>
